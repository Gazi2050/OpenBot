services:
  postgres:
    image: postgres:16-alpine
    container_name: openbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: openbot
      POSTGRES_PASSWORD: openbot
      POSTGRES_DB: openbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
